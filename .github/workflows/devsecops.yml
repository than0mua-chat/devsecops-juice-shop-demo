name: Juice Shop DevSecOps Demo

on:
  push:
    branches: [ "master", "main" ]

jobs:
  # 1. Secret Scanning (Quét key/password)
  secret-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Cho phép chạy tiếp dù phát hiện lỗi

  # 2. SAST (Quét mã nguồn tĩnh)
  sast-scan:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/javascript"
        continue-on-error: true

  # 3. SCA (Quét thư viện & Xuất HTML đẹp mắt)
  sca-scan:
    name: Node.js Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài đặt công cụ chuyển đổi npm-audit sang HTML
        run: npm install -g npm-audit-html
      - name: Chạy npm audit và xuất ra HTML
        run: |
          npm install --package-lock-only --ignore-scripts
          # Xuất dữ liệu thô ra file JSON
          npm audit --json > npm-audit.json || true 
          # Chuyển JSON thành giao diện HTML
          npm-audit-html --input npm-audit.json --output npm-audit-report.html
      - name: Tải báo cáo lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SCA-npm-audit-report # Tên file khi bạn tải về
          path: npm-audit-report.html

  # 4. Container Security (Quét Docker & Xuất file Text)
  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t juice-shop-demo:latest .
      - name: Chạy Trivy và lưu ra file
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'juice-shop-demo:latest'
          format: 'table'
          output: 'trivy-report.txt' # Chỉ định Trivy ghi kết quả vào file này
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
      - name: Tải báo cáo lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Container-Trivy-report
          path: trivy-report.txt

  # 5. DAST (Quét động & Tận dụng HTML có sẵn của ZAP)
  dast-scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Juice Shop Container
        run: |
          docker build -t juice-shop-demo:latest .
          docker run -d -p 3000:3000 juice-shop-demo:latest
          sleep 20 
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:3000'
        continue-on-error: true
      # ZAP Action mặc định sẽ tự tạo một file tên là 'zap_report.html' ở thư mục gốc
      - name: Tải báo cáo ZAP lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DAST-ZAP-report
          path: zap_report.html
      - uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:3000'
        continue-on-error: true
