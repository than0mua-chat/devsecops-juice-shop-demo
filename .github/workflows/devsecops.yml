name: Juice Shop DevSecOps Demo

on:
  push:
    branches: [ "master", "main" ]

jobs:
  # 1. Secret Scanning (Quét key/password)
  secret-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Cho phép chạy tiếp dù phát hiện lỗi

  # 2. SAST (Quét mã nguồn tĩnh)
  sast-scan:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/javascript"
        continue-on-error: true

  # 3. SCA (Quét thư viện bên thứ 3)
  sca-scan:
    name: Node.js Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit
        run: |
          npm install --package-lock-only --ignore-scripts
          npm audit || true # Dùng || true để không fail pipeline

  # 4. Container Security (Đóng gói và quét Docker Image)
  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t juice-shop-demo:latest .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'juice-shop-demo:latest'
          format: 'table'
          exit-code: '0' # Trả về 0 để pipeline không báo đỏ
          severity: 'CRITICAL,HIGH'

  # 5. DAST (Chạy ứng dụng và quét động)
  dast-scan:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Juice Shop Container
        run: |
          docker build -t juice-shop-demo:latest .
          docker run -d -p 3000:3000 juice-shop-demo:latest
          # Đợi 20 giây để ứng dụng khởi động hoàn toàn
          sleep 20 
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:3000'
        continue-on-error: true
